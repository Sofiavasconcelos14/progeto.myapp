<div class="container">
  <h1>Loja</h1>
  <button class="carrinho-btn" routerLink="/carrinho">Ver Carrinho</button>
  <div class="prod-container">
    @for (produto of produtos; track produto.id) {
      <div class="card" style="width: 18rem">
        <img src="{{ produto.imgs[0] }}" class="card-img" alt="..." />
        <div class="card-body">
          <h5 class="card-title">{{ produto.nome }}</h5>
          <p class="card-text">{{ produto.descricao }}</p>
          <p class="card-text-xl">R$ {{ produto.preco }}</p>
          <button (click)="adicionarAoCarrinho(produto)" class="btn btn-primary">Adicionar</button>
        </div>
      </div>
    }
  </div>
</div>
