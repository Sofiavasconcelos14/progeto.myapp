<div class="container">
  <h1>B&V Fragrances</h1>
  <button class="carrinho-btn" routerLink="/carrinho"> Ver Carrinho</button>
  <div class="prod-container">
    @for (produto of produtos; track produto.id) {
      <div class="card">
        <img src="{{ produto.imgs[0] }}" class="card-img" alt="Produto" />
        <div class="card-body">
          <h5 class="card-title">{{ produto.nome }}</h5>
          <p class="card-text">
            {{ produto.descricao }}
          </p>
          <p class="card-text-xl">R$ {{ produto.preco }}</p>
          <button (click)="adicionarAoCarrinho(produto)" class="btn btn-primary">
            Adicionar ao Carrinho
          </button>
        </div>
      </div>
    }
  </div>
</div>
