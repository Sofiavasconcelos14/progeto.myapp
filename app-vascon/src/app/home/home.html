<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B&V Fragrances</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="home.css">
</head>

<body>

<div class="container-fluid p-0">

    <div class="banner">
        <h1>B&V Fragrances</h1>
        <p>Do sonho de um TCC ao nascimento de uma grande empresa.</p>

        <button class="btn-bv" routerLink="/loja">
            Conheça Nossa Coleção
        </button>
    </div>

    <div class="cont4">

        <div id="carouselExampleIndicators" class="carousel slide carousel-custom">

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>

                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>

                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
            </div>

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="1.jpg" class="d-block w-100" alt="">
                </div>

                <div class="carousel-item">
                    <img src="image2.jpeg" class="d-block w-100" alt="">
                </div>

                <div class="carousel-item">
                    <img src="image0.jpeg" class="d-block w-100" alt="">
                </div>

            </div>

            <button
                class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>
            </button>

            <button
                class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleIndicators"
                data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

    </div>

    <section class="cont5">

        <div class="card-produto">
            <img src="image5.jpeg" alt="">
            <h2>Perfume Elegance</h2>
            <h3>R$ 500,00</h3>
           
        </div>

        <div class="card-produto">
            <img src="image7.jpeg" alt="">
            <h2>Perfume Rosé</h2>
            <h3>R$ 200,00</h3>
            
        </div>

        <div class="card-produto">
            <img src="image6.jpeg" alt="">
            <h2>Perfume Luxury</h2>
            <h3>R$ 200,00</h3>
            
        </div>

        <div class="card-produto">
            <img src="image8.jpeg.jpg" alt="">
            <h2>Perfume Violet</h2>
            <h3>R$ 200,00</h3>
           
        </div>

        <div class="card-produto">
            <img src="image9.jpeg.jpg" alt="">
            <h2>Perfume Premium</h2>
            <h3>R$ 200,00</h3>
            
        </div>

        <div class="card-produto">
            <img src="image10.jpeg.jpg" alt="">
            <h2>Perfume Exclusive</h2>
            <h3>R$ 200,00</h3>
            
        </div>

    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
